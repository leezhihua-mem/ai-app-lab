<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>病例OCR小程序 - Web版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
        }
        
        .mobile-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        .header {
            background: linear-gradient(135deg, #2E7D32 0%, #4CAF50 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .header-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .header-subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* 上传区域 */
        .upload-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .upload-area {
            border: 2px dashed #4CAF50;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            background: #E8F5E9;
            border-color: #2E7D32;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .upload-text {
            font-size: 16px;
            color: #2E7D32;
            font-weight: bold;
        }
        
        .upload-options {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .upload-option {
            flex: 1;
            background: #E8F5E9;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-option:hover {
            background: #C8E6C9;
        }
        
        /* 进度条 */
        .progress-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        
        .progress-bar {
            height: 8px;
            background: #E8F5E9;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #2E7D32 0%, #4CAF50 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
        
        /* 结果展示 */
        .result-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        
        .result-header {
            font-size: 18px;
            font-weight: bold;
            color: #2E7D32;
            margin-bottom: 15px;
        }
        
        .result-card {
            background: #E8F5E9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .result-card-title {
            font-size: 14px;
            font-weight: bold;
            color: #2E7D32;
            margin-bottom: 8px;
        }
        
        .result-card-content {
            font-size: 12px;
            color: #666;
        }
        
        .alert-card {
            background: #FFEBEE;
            border: 2px solid #F44336;
        }
        
        .alert-card-title {
            color: #F44336;
        }
        
        /* 按钮 */
        .btn-primary {
            background: linear-gradient(135deg, #2E7D32 0%, #4CAF50 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        /* 隐藏的文件输入 */
        #fileInput {
            display: none;
        }
        
        #cameraInput {
            display: none;
        }
        
        /* 提示 */
        .tips {
            background: #FFF3E0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .tips-title {
            font-size: 14px;
            font-weight: bold;
            color: #E65100;
            margin-bottom: 8px;
        }
        
        .tips-content {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-title">🥔 病例OCR小程序</div>
            <div class="header-subtitle">智能识别 · 健康管理 · 家庭协同</div>
        </div>
        
        <!-- 上传区域 -->
        <div class="upload-section">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📷</div>
                <div class="upload-text">点击上传病例/化验单/体检报告</div>
            </div>
            
            <div class="upload-options">
                <div class="upload-option" onclick="document.getElementById('fileInput').click()">
                    📁 选择文件
                </div>
                <div class="upload-option" onclick="openCamera()">
                    📸 拍照上传
                </div>
            </div>
            
            <!-- 隐藏的文件输入 -->
            <input type="file" id="fileInput" accept="image/*,application/pdf" onchange="handleFileUpload(event)">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFileUpload(event)">
        </div>
        
        <!-- 进度条 -->
        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">正在识别...</div>
        </div>
        
        <!-- 结果展示 -->
        <div class="result-section" id="resultSection">
            <div class="result-header">✅ 识别结果</div>
            
            <div class="result-card">
                <div class="result-card-title">基本信息</div>
                <div class="result-card-content" id="basicInfo">-</div>
            </div>
            
            <div class="result-card">
                <div class="result-card-title">检查项目</div>
                <div class="result-card-content" id="checkItems">-</div>
            </div>
            
            <div class="result-card" id="alertCard" style="display: none;">
                <div class="result-card-title">⚠️ 异常提醒</div>
                <div class="result-card-content" id="alertContent">-</div>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn-primary" onclick="exportData()">导出数据</button>
            </div>
        </div>
        
        <!-- 提示 -->
        <div class="tips">
            <div class="tips-title">💡 使用提示</div>
            <div class="tips-content">
                1. 支持 PDF、JPG、PNG 格式<br>
                2. 文件大小不超过 10MB<br>
                3. 识别结果自动保存到健康档案<br>
                4. 异常指标会自动预警
            </div>
        </div>
    </div>
    
    <!-- OCR识别逻辑 -->
    <script>
        // API配置
        const API_BASE = 'http://localhost:8002/api/ocr';
        
        // 打开相机
        function openCamera() {
            document.getElementById('cameraInput').click();
        }
        
        // 处理文件上传
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 检查文件大小
            if (file.size > 10 * 1024 * 1024) {
                alert('文件大小不能超过10MB');
                return;
            }
            
            // 显示进度条
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            
            try {
                // 上传文件
                updateProgress(20, '正在上传文件...');
                const formData = new FormData();
                formData.append('file', file);
                
                // 调用OCR API
                updateProgress(40, '正在识别文件类型...');
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error('OCR识别失败');
                }
                
                updateProgress(60, '正在提取内容...');
                const result = await response.json();
                
                updateProgress(80, '正在结构化数据...');
                
                // 显示结果
                displayResult(result);
                
                updateProgress(100, '识别完成！');
                
                // 3秒后隐藏进度条
                setTimeout(() => {
                    document.getElementById('progressSection').style.display = 'none';
                }, 3000);
                
            } catch (error) {
                console.error('OCR识别错误:', error);
                alert('OCR识别失败，请重试');
                document.getElementById('progressSection').style.display = 'none';
            }
        }
        
        // 更新进度
        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressText').textContent = text;
        }
        
        // 显示结果
        function displayResult(result) {
            document.getElementById('resultSection').style.display = 'block';
            
            // 基本信息
            const basicInfo = result.structured_data?.basic_info || {};
            document.getElementById('basicInfo').innerHTML = `
                姓名: ${basicInfo.name || '-'}<br>
                年龄: ${basicInfo.age || '-'}<br>
                医院: ${basicInfo.hospital || '-'}<br>
                日期: ${basicInfo.date || '-'}
            `;
            
            // 检查项目
            const items = result.structured_data?.items || [];
            let itemsHtml = '';
            items.forEach(item => {
                const status = item.status === 'normal' ? '✅ 正常' : '⚠️ 异常';
                itemsHtml += `${item.name}: ${item.value} ${item.unit} (${status})<br>`;
            });
            document.getElementById('checkItems').innerHTML = itemsHtml || '-';
            
            // 异常提醒
            const alerts = result.alerts || [];
            if (alerts.length > 0) {
                document.getElementById('alertCard').style.display = 'block';
                let alertHtml = '';
                alerts.forEach(alert => {
                    alertHtml += `${alert.level}: ${alert.message}<br>`;
                });
                document.getElementById('alertContent').innerHTML = alertHtml;
            } else {
                document.getElementById('alertCard').style.display = 'none';
            }
        }
        
        // 导出数据
        function exportData() {
            const resultSection = document.getElementById('resultSection');
            if (resultSection.style.display === 'none') {
                alert('暂无数据可导出');
                return;
            }
            
            // 模拟导出（实际需要调用API）
            alert('数据导出功能开发中...');
        }
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('病例OCR Web版加载完成');
        });
    </script>
</body>
</html>
